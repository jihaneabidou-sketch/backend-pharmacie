# Configuration de la connexion MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacie_en_ligne_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration de JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 'update' permet à Hibernate de créer automatiquement les tables manquantes 
# ou de les modifier sans supprimer vos données existantes.
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL générées dans la console (très pratique pour déboguer)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true